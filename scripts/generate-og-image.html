<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Image Generator</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #f0f0f0; }
    #canvas-container { margin: 20px 0; }
    canvas { border: 1px solid #ccc; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #ff7eb3; color: white; border: none; border-radius: 8px; }
    p { color: #666; }
  </style>
</head>
<body>
  <h2>OG Image PNG Generator</h2>
  <p>아래 버튼을 클릭하면 og-image.png가 다운로드됩니다.<br>
  다운로드 후 프로젝트 루트에 넣고 배포하세요.</p>
  <div id="canvas-container">
    <canvas id="og" width="1200" height="630"></canvas>
  </div>
  <button onclick="downloadPNG()">PNG 다운로드</button>

  <script>
    const canvas = document.getElementById('og');
    const ctx = canvas.getContext('2d');

    // 배경 그라데이션
    const bg = ctx.createLinearGradient(0, 0, 1200, 630);
    bg.addColorStop(0, '#fff5f9');
    bg.addColorStop(1, '#f3e8ff');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, 1200, 630);

    // 제목
    ctx.fillStyle = '#4a3a5c';
    ctx.font = 'bold 72px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🍀 로또 번호 예상기', 600, 180);

    // 부제
    ctx.fillStyle = '#8a7a9c';
    ctx.font = '32px sans-serif';
    ctx.fillText('사주 · 이름 · MBTI · 궁합 · 통계 기반 7가지 알고리즘', 600, 250);

    // 로또 공
    const balls = [
      { n: 7, color: '#fbc400' },
      { n: 14, color: '#69c8f2' },
      { n: 25, color: '#ff7272' },
      { n: 30, color: '#ff7272' },
      { n: 36, color: '#aaaaaa' },
      { n: 43, color: '#b0d840' },
    ];

    balls.forEach((ball, i) => {
      const x = 300 + i * 120;
      const y = 400;

      // 공 그림자
      ctx.beginPath();
      ctx.arc(x, y + 3, 45, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fill();

      // 공
      ctx.beginPath();
      ctx.arc(x, y, 45, 0, Math.PI * 2);
      ctx.fillStyle = ball.color;
      ctx.fill();

      // 하이라이트
      ctx.beginPath();
      ctx.arc(x - 12, y - 15, 15, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fill();

      // 숫자
      ctx.fillStyle = 'white';
      ctx.font = 'bold 32px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(ball.n), x, y + 2);
    });

    // 도메인
    ctx.fillStyle = '#ff7eb3';
    ctx.font = '28px sans-serif';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('nick1148.site', 600, 550);

    // 궁합 태그
    ctx.fillStyle = '#b4a7d6';
    ctx.font = '24px sans-serif';
    ctx.fillText('💕 궁합 테스트도 해보세요!', 600, 590);

    function downloadPNG() {
      const link = document.createElement('a');
      link.download = 'og-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
